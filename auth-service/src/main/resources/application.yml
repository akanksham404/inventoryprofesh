server:
  port: 8081

spring:
  application:
    name: auth-service

  # --- 🟢 DATABASE CONNECTION LAYER ---
  datasource:
    url: jdbc:mysql://localhost:3306/inventory_profesh_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # --- 🟢 KAFKA BROKER EVENT PIPELINE ---
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# --- 🟢 EUREKA SERVICE DISCOVERY (Fixed Syntax Error) ---
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

# --- 🟢 ACTUATOR METRICS & SERVICE TELEMETRY ---
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  info:
    env:
      enabled: true

info:
  app:
    name: "Inventory Profesh - Authentication Service"
    description: "Enterprise Security & RBAC Gateway Token Provider"
    version: "1.0.0"